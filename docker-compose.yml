services:
  app:
    build: .
    env_file: .env
    environment:
      # keep the sqlite file on the mounted volume
      dbPath: /app/data/pipeline.sqlite
    ports:
      # host port is configurable to avoid clashes; container is always 8000.
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Optional: public tunnel so GitHub can reach the webhook.
  # Enable with:  docker compose --profile tunnel up
  # Then read this container's logs for the https://<random>.trycloudflare.com URL
  # and register it with:  ./scripts/register_webhook.sh <that-url>
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://app:8000 --no-autoupdate
    depends_on:
      - app
    profiles: ["tunnel"]
    restart: unless-stopped
